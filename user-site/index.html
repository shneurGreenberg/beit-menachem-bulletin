      rel="canonical"
      href="https://shneurgreenberg.github.io/beit-menachem-bulletin/"
    />
    <title>עלון שבת | בית מנחם</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        background: #f3f3f3;
        color: #222;
      }
      main {
        text-align: center;
        padding: 2rem;
      }
      a {
        color: #222;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <p>מעבירים לעלון השבת של בית מנחם…</p>
      <p>
        <a id="go" href="https://shneurgreenberg.github.io/beit-menachem-bulletin/"
          >לחצו כאן אם לא הועברתם אוטומטית</a
        >
      </p>
    </main>
    <script>
      (async () => {
        const dest = "https://shneurgreenberg.github.io/beit-menachem-bulletin/";
        try {
          if ("serviceWorker" in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
          }
          if (window.caches?.keys) {
            const keys = await caches.keys();
            await Promise.all(keys.map((k) => caches.delete(k)));
          }
        } catch (_) {
          /* ignore */
        }
        location.replace(dest);
      })();
    </script>
  </body>
