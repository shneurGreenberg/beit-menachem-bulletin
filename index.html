<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#222222" />
    <meta
      name="description"
      content="עלון שבת שבועי — בית כנסת בית מנחם חב״ד גבעת שרת, בית שמש"
    />
    <title>עלון שבת | בית מנחם</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./css/styles.css?v=17" />
    <script>
      // GitHub project Pages needs a trailing slash so ./js and ./css resolve correctly.
      (function ensureTrailingSlash() {
        var path = location.pathname;
        if (path.endsWith('/') || /\.[a-zA-Z0-9]+$/.test(path)) return;
        location.replace(path + '/' + location.search + location.hash);
      })();
    </script>
  </head>
  <body>
    <div class="toolbar" role="toolbar" aria-label="פעולות">
      <button type="button" id="btn-edit">מצב עריכה</button>
      <button type="button" id="btn-print">הדפסה / PDF</button>
      <button type="button" id="btn-whatsapp">שיתוף בוואטסאפ</button>
      <button type="button" id="btn-history">היסטוריית פרשות</button>
      <button type="button" id="btn-back-current">שבוע נוכחי</button>
    </div>

    <div class="edit-panel" id="edit-panel" hidden>
      <button type="button" id="btn-save">שמירת שינויים</button>
      <button type="button" id="btn-undo">בטל שינוי אחרון</button>
      <button type="button" id="btn-reset">איפוס לזמנים אוטומטיים</button>
      <button type="button" id="btn-add-message">הוסף הודעה</button>
      <select id="template-select" aria-label="תבנית הודעה"></select>
      <button type="button" id="btn-upload-zmanim">העלאת טבלת זמנים (Excel)</button>
      <button type="button" id="btn-clear-zmanim">הסרת טבלת זמנים</button>
      <button type="button" id="btn-change-pw">שינוי סיסמה</button>
      <span class="edit-dirty" id="dirty-flag" hidden>● שינויים לא שמורים</span>
    </div>

    <div id="loading">טוען זמני שבת לבית שמש…</div>

    <div id="app" hidden>
      <main class="page-wrap">
        <article class="sheet" aria-label="עלון השבת">
          <div class="mast-name" id="synagogue-name"></div>

          <div class="zman-strip" aria-label="הדלקה ויציאה">
            <div class="zman-chip">
              <span class="zman-label">הדלקת נרות</span>
              <span class="zman-time" id="hero-candles-time">--:--</span>
            </div>
            <div class="zman-chip">
              <span class="zman-label">יציאת השבת</span>
              <span class="zman-time" id="hero-end-time">--:--</span>
            </div>
          </div>

          <div class="messages-wrap" id="important-messages"></div>

          <section class="board" aria-label="זמני השבת">
            <div class="band band-main" id="week-title">השבת</div>
            <div class="cols">
              <div class="col">
                <div class="band band-sub">ערב שבת</div>
                <div class="schedule" id="friday-schedule"></div>
                <div class="band band-sub">שבת בבוקר</div>
                <div class="schedule" id="morning-schedule"></div>
              </div>
              <div class="col">
                <div class="band band-sub">שבת אחר הצהריים</div>
                <div class="schedule" id="afternoon-schedule"></div>
              </div>
            </div>
          </section>

          <div class="messages-wrap" id="messages-mid"></div>

          <section class="board" aria-label="השבוע הקרוב">
            <div class="band band-main" id="next-week-title">השבוע הקרוב</div>
            <div class="cols">
              <div class="col">
                <div class="band band-sub">תפילות בימי חול</div>
                <div class="schedule" id="weekday-schedule"></div>
              </div>
              <div class="col">
                <div class="band band-sub">שיעורים קבועים</div>
                <div class="lessons" id="fixed-lessons"></div>
              </div>
            </div>
            <div id="special-days-wrap"></div>
          </section>

          <div class="messages-wrap" id="messages-bottom"></div>

          <footer class="sheet-footer">
            <span class="shabbat-shalom">שבת שלום</span>
            <span class="footer-sep">·</span>
            <span class="slogan" id="slogan"></span>
          </footer>

          <p class="source-note" id="source-note"></p>
        </article>
      </main>
    </div>

    <aside class="side-panel" id="history-panel" hidden>
      <header>
        <h2>היסטוריית פרשות</h2>
        <button type="button" class="icon" id="btn-close-history" aria-label="סגירה">×</button>
      </header>
      <ul id="history-list"></ul>
    </aside>

    <div id="toast" hidden></div>

    <script type="module" src="./js/app.js?v=17"></script>
  </body>
</html>
