<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111111" />
    <meta
      name="description"
      content="עלון שבת שבועי — בית כנסת בית מנחם חב״ד גבעת שרת, בית שמש"
    />
    <title>עלון שבת | בית מנחם</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="toolbar" role="toolbar" aria-label="פעולות">
      <button type="button" id="btn-edit">מצב עריכה</button>
      <button type="button" id="btn-print">הדפסה / PDF</button>
      <button type="button" id="btn-whatsapp">שיתוף בוואטסאפ</button>
      <button type="button" id="btn-history">היסטוריית פרשות</button>
      <button type="button" id="btn-back-current">שבוע נוכחי</button>
    </div>

    <div class="edit-panel" id="edit-panel" hidden>
      <button type="button" id="btn-save">שמירת שינויים</button>
      <button type="button" id="btn-reset">איפוס לזמנים אוטומטיים</button>
      <select id="template-select" aria-label="תבנית הודעה"></select>
      <span class="muted">סיסמת עריכה ראשונית: menachem</span>
    </div>

    <div id="loading">טוען זמני שבת לבית שמש…</div>

    <div id="app" hidden>
      <main class="page-wrap">
        <article class="sheet" aria-label="עלון השבת">
          <div class="ornament">שבת קודש</div>
          <h1 class="synagogue-name" id="synagogue-name"></h1>
          <h2 class="week-title" id="week-title"></h2>

          <!-- שבת הנוכחית -->
          <section class="section section-shabbat" aria-labelledby="shabbat-heading">
            <header class="section-head">
              <span class="section-kicker">חלק א׳</span>
              <h3 class="section-title" id="shabbat-heading">זמני השבת הנוכחית</h3>
            </header>

            <div class="hero-times">
              <div class="hero-card">
                <span class="label">שעת הדלקת נרות</span>
                <span class="time" id="hero-candles-time">--:--</span>
              </div>
              <div class="hero-card">
                <span class="label">שעת יציאת השבת</span>
                <span class="time" id="hero-end-time">--:--</span>
              </div>
            </div>

            <h4 class="block-title">ערב שבת</h4>
            <div class="schedule" id="friday-schedule"></div>

            <aside class="important-message" id="important-message" hidden></aside>

            <h4 class="block-title">שבת בבוקר</h4>
            <div class="schedule" id="morning-schedule"></div>

            <h4 class="block-title">שבת אחר הצהריים</h4>
            <div class="schedule" id="afternoon-schedule"></div>
          </section>

          <div class="divider" aria-hidden="true">✦ ✦ ✦</div>

          <!-- השבוע הקרוב -->
          <section class="section section-week" aria-labelledby="week-heading">
            <header class="section-head">
              <span class="section-kicker">חלק ב׳</span>
              <h3 class="section-title" id="week-heading">
                <span id="next-week-title">השבוע הקרוב</span>
              </h3>
            </header>

            <h4 class="block-title">זמני התפילות בימי החול</h4>
            <div class="schedule" id="weekday-schedule"></div>

            <h4 class="block-title">שיעורים קבועים</h4>
            <div class="lessons" id="fixed-lessons"></div>

            <div id="special-days-wrap"></div>
          </section>

          <footer class="sheet-footer">
            <p class="shabbat-shalom">שבת שלום</p>
            <hr class="footer-rule" />
            <p class="slogan" id="slogan"></p>
          </footer>

          <p class="source-note" id="source-note"></p>
        </article>
      </main>
    </div>

    <aside class="side-panel" id="history-panel" hidden>
      <header>
        <h2>היסטוריית פרשות</h2>
        <button type="button" class="icon" id="btn-close-history" aria-label="סגירה">×</button>
      </header>
      <ul id="history-list"></ul>
    </aside>

    <div id="toast" hidden></div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
