<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111111" />
    <meta
      name="description"
      content="עלון שבת שבועי — בית כנסת בית מנחם חב״ד גבעת שרת, בית שמש"
    />
    <title>עלון שבת | בית מנחם</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="toolbar" role="toolbar" aria-label="פעולות">
      <button type="button" id="btn-edit">מצב עריכה</button>
      <button type="button" id="btn-print">הדפסה / PDF</button>
      <button type="button" id="btn-whatsapp">שיתוף בוואטסאפ</button>
      <button type="button" id="btn-history">היסטוריית פרשות</button>
      <button type="button" id="btn-back-current">שבוע נוכחי</button>
    </div>

    <div class="edit-panel" id="edit-panel" hidden>
      <button type="button" id="btn-save">שמירת שינויים</button>
      <button type="button" id="btn-reset">איפוס לזמנים אוטומטיים</button>
      <button type="button" id="btn-add-message">הוסף הודעה</button>
      <select id="template-select" aria-label="תבנית הודעה"></select>
      <span class="muted">סיסמת עריכה ראשונית: menachem</span>
    </div>

    <div id="loading">טוען זמני שבת לבית שמש…</div>

    <div id="app" hidden>
      <main class="page-wrap">
        <article class="sheet" aria-label="עלון השבת">
          <!-- פס עליון צפוף -->
          <header class="mast">
            <div class="mast-name" id="synagogue-name"></div>
            <div class="mast-week" id="week-title"></div>
          </header>

          <!-- נרות / יציאה בשורה אחת -->
          <div class="zman-strip" aria-label="הדלקה ויציאה">
            <div class="zman-chip">
              <span class="zman-label">הדלקת נרות</span>
              <span class="zman-time" id="hero-candles-time">--:--</span>
            </div>
            <div class="zman-chip">
              <span class="zman-label">יציאת השבת</span>
              <span class="zman-time" id="hero-end-time">--:--</span>
            </div>
          </div>

          <div class="messages-wrap" id="important-messages"></div>

          <!-- שבת: שני טורים -->
          <section class="board board-shabbat" aria-label="זמני השבת">
            <div class="col">
              <div class="band">ערב שבת</div>
              <div class="schedule" id="friday-schedule"></div>
              <div class="band">שבת בבוקר</div>
              <div class="schedule" id="morning-schedule"></div>
            </div>
            <div class="col">
              <div class="band">שבת אחר הצהריים</div>
              <div class="schedule" id="afternoon-schedule"></div>
            </div>
          </section>

          <!-- שבוע קרוב: פס + רשת -->
          <section class="board board-week" aria-label="השבוע הקרוב">
            <div class="band band-week" id="next-week-title">השבוע הקרוב</div>
            <div class="week-grid">
              <div class="week-block">
                <div class="band-sm">תפילות בימי חול</div>
                <div class="schedule" id="weekday-schedule"></div>
              </div>
              <div class="week-block">
                <div class="band-sm">שיעורים קבועים</div>
                <div class="lessons" id="fixed-lessons"></div>
              </div>
            </div>
            <div id="special-days-wrap"></div>
          </section>

          <footer class="sheet-footer">
            <span class="shabbat-shalom">שבת שלום</span>
            <span class="footer-sep">·</span>
            <span class="slogan" id="slogan"></span>
          </footer>

          <p class="source-note" id="source-note"></p>
        </article>
      </main>
    </div>

    <aside class="side-panel" id="history-panel" hidden>
      <header>
        <h2>היסטוריית פרשות</h2>
        <button type="button" class="icon" id="btn-close-history" aria-label="סגירה">×</button>
      </header>
      <ul id="history-list"></ul>
    </aside>

    <div id="toast" hidden></div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
